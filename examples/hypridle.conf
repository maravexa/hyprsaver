# hyprsaver + hyprlock integration for hypridle
# Copy the relevant listener blocks into your ~/.config/hypr/hypridle.conf

# Screensaver: activate after 10 minutes of inactivity
listener {
    timeout = 600                          # 10 minutes (seconds)
    on-timeout = hyprsaver                 # start screensaver
    on-resume = hyprsaver --quit           # stop screensaver on activity
}

# Lock screen: activate after 20 minutes of inactivity
listener {
    timeout = 1200                         # 20 minutes (seconds)
    on-timeout = hyprlock                  # lock the session
}

# Optional: dim screen before screensaver (requires brightnessctl)
# listener {
#     timeout = 540                        # 9 minutes -- 1 min before screensaver

# Optional Hyprland keybinds for hyprsaver
# Add to ~/.config/hypr/hyprland.conf

# Manually trigger screensaver
bind = $mainMod, F12, exec, hyprsaver

# Kill screensaver
bind = , escape, exec, hyprsaver --quit

# Toggle idle inhibit for current window (e.g., when watching a video
# in a player that doesn't set idle inhibitor automatically)
bind = $mainMod SHIFT, I, exec, hyprctl dispatch -- togglespecialworkspace inhibit

# Alternative: temporarily disable hypridle for 2 hours
# bind = $mainMod SHIFT, I, exec, pkill hypridle && (sleep 7200 && hypridle &)

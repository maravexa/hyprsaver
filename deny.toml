[graph]
all-features = true

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
]
# Crates with licenses outside the allow list require explicit per-crate exceptions.
# See report: docs/dependency-audit-v0.4.4.md § License concerns.

[[licenses.exceptions]]
# option-ext is a transitive dep of dirs → dirs-sys → option-ext.
# MPL-2.0 is file-level copyleft; source is publicly available on crates.io.
# Does not affect MIT binary redistribution of hyprsaver itself.
name = "option-ext"
version = "0.2"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
# epaint_default_fonts embeds fonts (Inter, Hack, Ubuntu Mono) under OFL-1.1 and UFL-1.0.
# Both licenses permit embedding in binaries. Font sources remain publicly available.
# LicenseRef-UFL-1.0 is the Ubuntu Font License; restricts only standalone font resale.
name = "epaint_default_fonts"
version = "0.29"
allow = ["OFL-1.1", "LicenseRef-UFL-1.0"]

[[licenses.exceptions]]
# unicode-ident includes Unicode data tables under the Unicode License v3.
# Unicode-3.0 is OSI-approved and permissive (similar to BSD-3-Clause for Unicode data).
# The Rust code itself is MIT OR Apache-2.0; only the data tables carry Unicode-3.0.
name = "unicode-ident"
version = "1"
allow = ["Unicode-3.0"]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # instant 0.1.13 is unmaintained (RUSTSEC-2024-0384). Pulled in by:
    # notify-types → notify (our direct dep for hot-reload). No patched version exists;
    # notify-types has no upstream replacement pinned. Reachability: unreachable in
    # daemon mode (notify is only used for shader hot-reload on the filesystem watcher
    # path). Risk: low — unmaintained, not a CVE. Monitor notify for an upstream fix.
    { id = "RUSTSEC-2024-0384", reason = "instant is a transitive dep of notify with no patched version; unreachable in daemon mode; low risk" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
